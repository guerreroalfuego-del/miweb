<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Web en OpenClaw</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 3rem;
            background-color: #1e293b;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.1rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>¡Hola desde OpenClaw!</h1>
        <p>Esta es mi primera página conectada a Cloudflare y GitHub.</p>
    </div>
</body>
</html>
