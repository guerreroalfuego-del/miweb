<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Guerrero al Fuego 🔥</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a0a;
  color:#f5f5f5;
  font-family:system-ui,-apple-system,Segoe UI,sans-serif;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:24px;
}
h1{font-size:3rem;margin-bottom:8px}
.emoji-fire{font-size:4rem;margin-bottom:16px}
h2{font-size:1.2rem;color:#facc15;font-weight:400;margin-bottom:24px}
p{color:#94a3b8;max-width:400px;line-height:1.6;font-size:14px}
.badge{
  display:inline-block;
  background:#1f2937;
  border:1px solid #334155;
  color:#94a3b8;
  padding:6px 16px;
  border-radius:999px;
  font-size:12px;
  margin-top:24px;
}
.fueguin{
  font-size:6rem;
  margin-bottom:8px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.05)}
}
</style>
</head>
<body>
<div class="fueguin">🔥</div>
<h1>Guerrero al Fuego</h1>
<h2>Próximamente</h2>
<p>Estamos cocinando algo nuevo. Recetas, fuego y mucho sabor están en camino. Vuelve pronto.</p>
<div class="badge">🚧 En construcción</div>
</body>
</html>
