<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Básico -->
    <title>Guerrero al Fuego | Inicio</title>
    <meta name="description" content="Bienvenido a Guerrero al Fuego. Descubre mi trabajo, proyectos y servicios profesionales.">
    <meta name="keywords" content="guerrero al fuego, portfolio, proyectos, servicios">
    <meta name="author" content="Guerrero">
    
    <!-- Open Graph (Para cuando compartes en WhatsApp, Facebook, etc) -->
    <meta property="og:title" content="Guerrero al Fuego">
    <meta property="og:description" content="Descubre mi trabajo, proyectos y servicios profesionales.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://guerreroalfuego.com">
    <meta property="og:image" content="https://guerreroalfuego.com/imagen-portada.jpg">
    
    <!-- Fuentes y Estilos -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505;
            --primary: #ef4444; /* Rojo fuego */
            --primary-glow: rgba(239, 68, 68, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Efecto de fondo dinámico */
        .glow-bg {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, var(--primary-glow) 0%, transparent 50%);
            opacity: 0.15;
            z-index: -1;
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.1; }
            100% { transform: scale(1.1); opacity: 0.2; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #f8fafc, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: slideUp 1s ease-out forwards;
        }

        p.subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 3rem;
            animation: slideUp 1s ease-out 0.2s forwards;
            opacity: 0;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 500;
            color: #fff;
            background: var(--primary);
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            box-shadow: 0 0 20px var(--primary-glow);
            animation: slideUp 1s ease-out 0.4s forwards;
            opacity: 0;
        }

        .btn:hover {
            background: transparent;
            border-color: var(--primary);
            box-shadow: 0 0 30px var(--primary-glow);
            transform: translateY(-3px);
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Información de contacto */
        .contact-info {
            margin-top: 5rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="glow-bg"></div>
    <div class="container">
        <h1>Guerrero al Fuego</h1>
        <p class="subtitle">He configurado todo el sistema de código y SEO para que los buscadores como Google te encuentren fácilmente. Ahora solo necesitas personalizar este texto.</p>
        <a href="mailto:contacto@guerreroalfuego.com" class="btn">Contactar</a>
        
        <div class="contact-info">
            <p>Escríbeme a: <strong>contacto@guerreroalfuego.com</strong></p>
        </div>
    </div>
</body>
</html>
