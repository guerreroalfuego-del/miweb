<!doctype html>
<html lang='es'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Recetas · Guerrero al Fuego 🔥</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;background:#0a0a0a;color:#f5f5f5;min-height:100vh}
header{background:linear-gradient(135deg,#1a1a1a 0%,#2d0808 100%);padding:24px 16px;text-align:center;border-bottom:3px solid #D62828}
header h1{color:#D62828;font-size:28px;font-weight:800;letter-spacing:-1px}
header h1 span{color:#FEC601}
header p{color:#a3a3a3;font-size:14px;margin-top:4px}
.search-bar{display:flex;gap:8px;max-width:600px;margin:16px auto 0;flex-wrap:wrap;justify-content:center}
.search-bar input{flex:1;min-width:200px;padding:10px 14px;border-radius:999px;border:1px solid #333;background:#1a1a1a;color:#f5f5f5;font-size:14px}
.search-bar select{padding:10px 14px;border-radius:999px;border:1px solid #333;background:#1a1a1a;color:#f5f5f5;font-size:14px;cursor:pointer}
.series-tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;padding:12px 16px;background:#0a0a0a}
.series-tab{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:999px;padding:6px 14px;color:#a3a3a3;cursor:pointer;font-size:13px;transition:all .2s;font-family:inherit}
.series-tab:hover{border-color:#D62828;color:#fff}
.series-tab.active{background:#D62828;border-color:#D62828;color:#fff;font-weight:700}

main{max-width:1100px;margin:0 auto;padding:20px 16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.recipe-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;overflow:hidden;transition:transform .2s,border-color .2s;cursor:pointer}
.recipe-card:hover{transform:translateY(-4px);border-color:#D62828}
.recipe-card .img-placeholder{background:linear-gradient(135deg,#2d0808,#1a1a1a);height:160px;display:flex;align-items:center;justify-content:center;font-size:48px}
.recipe-card .body{padding:16px}
.recipe-card h2{font-size:18px;font-weight:700;margin-bottom:4px;color:#FEC601}
.recipe-card .meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.recipe-card .meta span{font-size:12px;padding:2px 8px;border-radius:999px}
.badge-facil{background:#166534;color:#86efac}
.badge-media{background:#92400e;color:#fde68a}
.badge-dificil{background:#7f1d1d;color:#fca5a5}
.badge-serie{background:#D62828;color:white;font-weight:600}
.recipe-card p{color:#a3a3a3;font-size:13px;line-height:1.4;margin-bottom:8px}
.recipe-card .bottom{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#666}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:100;overflow-y:auto;padding:20px}
.modal-overlay.active{display:flex;align-items:flex-start;justify-content:center}
.modal-content{background:#1a1a1a;border:1px solid #333;border-radius:16px;max-width:700px;width:100%;padding:28px;margin-top:20px;position:relative}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;color:#666;font-size:28px;cursor:pointer}
.modal-close:hover{color:#fff}
.modal-content h2{font-size:24px;color:#FEC601;margin-bottom:4px}
.modal-content .meta{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 16px}
.modal-content .meta span{font-size:12px;padding:3px 10px;border-radius:999px}
.modal-content h3{color:#D62828;font-size:16px;margin:16px 0 8px;font-weight:700}
.modal-content ul,.modal-content ol{padding-left:20px;margin:8px 0}
.modal-content li{color:#d4d4d4;font-size:14px;line-height:1.6;margin:4px 0}
.modal-content .tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:12px}
.modal-content .tags span{background:#2a2a2a;color:#a3a3a3;font-size:11px;padding:2px 8px;border-radius:999px}
.empty{text-align:center;padding:60px 20px;color:#666}
.empty h2{color:#D62828;margin-bottom:8px}
footer{text-align:center;padding:24px;color:#444;font-size:12px}
footer span{color:#D62828}
@media(max-width:500px){.grid{grid-template-columns:1fr}.modal-content{padding:16px}}
</style>
</head>
<body>
<header>
<h1>🔥 Guerrero al <span>Fuego</span></h1>
<p>Recetas que molan, explicadas sin rodeos</p><p class="counter" id="recipe-counter"></p>
<div class='search-bar'>
  <input id='search' type='text' placeholder='Buscar receta...' oninput='filterRecipes()'>
  <select id='filter-serie' onchange='filterRecipes()'>
    <option value=''>Todas las series</option>
    <option value='rapida'>Receta Rápida</option>
    <option value='casi-liamos'>Casi la Liamos</option>
    <option value='3-ingredientes'>3 Ingredientes</option>
    <option value='picante'>Picante o No</option>
    <option value='resultado'>Resultado Final</option>
  </select>
</div>
</header>
<div class="series-tabs">
  <button class="series-tab active" data-series="" onclick="filterBySeries(this,'')">🔥 Todas</button>
  <button class="series-tab" data-series="rapida" onclick="filterBySeries(this,'rapida')">⚡ Rápidas</button>
  <button class="series-tab" data-series="casi-liamos" onclick="filterBySeries(this,'casi-liamos')">💀 Casi la Liamos</button>
  <button class="series-tab" data-series="3-ingredientes" onclick="filterBySeries(this,'3-ingredientes')">🥚 3 Ingredientes</button>
  <button class="series-tab" data-series="picante" onclick="filterBySeries(this,'picante')">🌶️ Picantes</button>
  <button class="series-tab" data-series="resultado" onclick="filterBySeries(this,'resultado')">✨ Resultado Final</button>
</div>

<main>
<div class='grid' id='recipes'><div class='empty'><h2>🔥</h2><p>Cargando recetas...</p></div></div>
</main>
<footer>🔥 Guerrero al Fuego — <span>Fueguín</span> está orgulloso de ti</footer>

<div class='modal-overlay' id='modal' onclick='if(event.target===this)closeModal()'>
<div class='modal-content' id='modal-content'>
<button class='modal-close' onclick='closeModal()'>×</button>
<div id='modal-body'></div>
</div></div>

<script>
let allRecipes=[];

async function api(url){ return fetch(url).then(r=>r.json()); }

async function init(){
  const data=await api('/api/gaf/recipes?status=publicado');
  allRecipes=(data.recipes||[]).concat((await api('/api/gaf/recipes')).recipes||[]);
  // Quitar duplicados por id
  const seen=new Set();
  allRecipes=allRecipes.filter(r=>{if(seen.has(r.id))return false;seen.add(r.id);return true;});
  renderAll();
}
  const counter = document.getElementById('recipe-counter');
  if(counter && allRecipes.length) counter.textContent = allRecipes.length + ' recetas 🔥';


function renderAll(){
  const search=document.getElementById('search').value.toLowerCase();
  const serie=document.getElementById('filter-serie').value;
  let filtered=allRecipes;
  if(search) filtered=filtered.filter(r=>r.title.toLowerCase().includes(search)||r.tags?.toLowerCase().includes(search)||r.description?.toLowerCase().includes(search));
  if(serie) filtered=filtered.filter(r=>r.series===serie);
  const el=document.getElementById('recipes');
  if(!filtered.length){ el.innerHTML='<div class="empty"><h2>😅</h2><p>No encontré nada con ese filtro</p></div>'; return; }
  const seriesNames={rapida:'Receta Rápida','casi-liamos':'Casi la Liamos','3-ingredientes':'3 Ingredientes',picante:'Picante o No',resultado:'Resultado Final'};
  el.innerHTML=filtered.map(r=>{
    const diffClass={facil:'badge-facil',media:'badge-media',dificil:'badge-dificil'}[r.difficulty]||'badge-facil';
    const diffLabel={facil:'Fácil',media:'Media',dificil:'Difícil'}[r.difficulty]||r.difficulty;
    return `<div class="recipe-card" onclick='showRecipe("${r.id}")'>
      <div class="img-placeholder">${r.series==='picante'?'🌶️':r.series==='3-ingredientes'?'🥚':'🍳'}</div>
      <div class="body">
        <h2>${r.title}</h2>
        <div class="meta">
          <span class="${diffClass}">${diffLabel}</span>
          ${r.prep_time?`<span>⏱ ${r.prep_time+r.cook_time}min</span>`:''}
          ${r.series?`<span class="badge-serie">${seriesNames[r.series]||r.series}</span>`:''}
        </div>
        ${r.description?`<p>${r.description}</p>`:''}
        <div class="bottom">
          <span>🍽 ${r.servings||1} rac.</span>
          <span>${r.status==='publicado'?'📺 Publicado':'📝 '+(r.status||'idea')}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function filterRecipes(){ renderAll(); }

function filterBySeries(btn, series){
  document.querySelectorAll('.series-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('filter-serie').value = series;
  renderAll();
}
  const counter = document.getElementById('recipe-counter');
  if(counter && allRecipes.length) counter.textContent = allRecipes.length + ' recetas 🔥';



function parseList(json){
  if(!json) return [];
  try{ const p=JSON.parse(json); return Array.isArray(p)?p:[p]; }catch(e){ return json.split('\n').filter(Boolean); }
}

async function showRecipe(id){
  const data=await api('/api/gaf/recipe?id='+id);
  if(!data||data.error) return;
  const diffLabel={facil:'Fácil',media:'Media',dificil:'Difícil'}[data.difficulty]||'';
  const diffClass={facil:'badge-facil',media:'badge-media',dificil:'badge-dificil'}[data.difficulty]||'badge-facil';
  const ingredients=parseList(data.ingredients);
  const steps=parseList(data.steps);
  const tags=data.tags?data.tags.split(',').map(t=>t.trim()).filter(Boolean):[];
  const seriesNames={rapida:'Receta Rápida','casi-liamos':'Casi la Liamos','3-ingredientes':'3 Ingredientes',picante:'Picante o No',resultado:'Resultado Final'};
  document.getElementById('modal-body').innerHTML=`
    <h2>${data.title}</h2>
    <div class="meta">
      <span class="${diffClass}">${diffLabel}</span>
      ${data.prep_time?`<span>⏱ Preparación: ${data.prep_time}min</span>`:''}
      ${data.cook_time?`<span>🔥 Cocción: ${data.cook_time}min</span>`:''}
      <span>🍽 ${data.servings||1} raciones</span>
      ${data.series?`<span class="badge-serie">${seriesNames[data.series]||data.series}</span>`:''}
    </div>
    ${data.description?`<p style="color:#a3a3a3;font-size:14px;line-height:1.5;margin-bottom:16px">${data.description}</p>`:''}
    <h3>🥘 Ingredientes</h3>
    <ul>${ingredients.map(i=>`<li>${i}</li>`).join('')}</ul>
    <h3>👨‍🍳 Elaboración</h3>
    <ol>${steps.map(s=>`<li>${s}</li>`).join('')}</ol>
    ${data.notes?`<h3>📝 Notas</h3><p style="color:#a3a3a3;font-size:14px;line-height:1.5">${data.notes}</p>`:''}
    ${tags.length?`<div class="tags">${tags.map(t=>`<span>#${t.toLowerCase().replace(/\s+/g,'')}</span>`).join('')}</div>`:''}
    ${data.video_url?`<div style="margin-top:16px"><a href="${data.video_url}" target="_blank" style="display:inline-block;background:#D62828;color:white;padding:10px 20px;border-radius:999px;text-decoration:none;font-weight:700">▶️ Ver vídeo</a></div>`:''}
  `;
  document.getElementById('modal').classList.add('active');
}

function closeModal(){ document.getElementById('modal').classList.remove('active'); }
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

init();
</script>
</body>
</html>
